<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELL DONE PRO</title>
<meta name="theme-color" content="#0F0D0B">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0D0B; --surface: #1A1714; --surface2: #231F1B; --surface3: #2D2824;
  --border: #3A332C; --gold: #D4AF37; --text: #E5E0DA; --text-muted: #A39B92;
  --green: #4CD964; --red: #FF3B30; --font-sans: 'Heebo', sans-serif; --font-serif: 'Frank Ruhl Libre', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg); color: var(--text); font-family: var(--font-sans); padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 60px; }

/* מסך נעילה יוקרתי */
.lock-screen {
  position: fixed; top: 0; bottom: 0; right: 0; left: 0;
  background: var(--bg); z-index: 5000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; transition: opacity 0.3s ease, pointer-events 0.3s ease;
}
.lock-screen.hidden { opacity: 0; pointer-events: none; }

/* כותרת האתר */
.app-header { background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 16px; position: relative; }
.header-top { display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: var(--font-serif); font-size: 24px; letter-spacing: 1px; font-weight: 900; }
.gold-text { color: var(--gold); }
.date-display { font-size: 13px; color: var(--text-muted); }

/* כפתורים ופקדים */
.btn { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); border-style: solid; }
.btn-primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
.btn-danger { background: rgba(255,59,48,0.15); color: var(--red); border-color: rgba(255,59,48,0.3); }
.btn-success { background: rgba(76,217,100,0.15); color: var(--green); border-color: rgba(76,217,100,0.3); }
.btn:active { transform: scale(0.98); }

/* שדות קלט */
.input-group { margin-bottom: 14px; text-align: right; }
.input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
input { width: 100%; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 15px; font-family: var(--font-sans); text-align: right; }
input:focus { outline: 1px solid var(--gold); }

/* כרטיסיות וסטטיסטיקה */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

/* שורת לקוח משופרת */
.client-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
.client-info h4 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.client-info p { font-size: 13px; color: var(--text-muted); }

.badge { padding: 5px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; text-align: center; min-width: 75px; }
.badge-green { background: rgba(76,217,100,0.15); color: var(--green); }
.badge-red { background: rgba(255,59,48,0.15); color: var(--red); }

/* מודאלים */
.modal-overlay { position: fixed; top: 0; bottom: 0; right: 0; left: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 1000; display: none; }
.modal-overlay.active { display: flex; }
.modal-content { background: var(--surface); border: 1px solid var(--gold); border-radius: 16px; width: 100%; max-width: 450px; padding: 20px; }

/* בועית נוטיפיקציה */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #222; border: 1px solid var(--gold); color: #fff; padding: 12px 24px; border-radius: 30px; z-index: 6000; transition: transform 0.3s ease; font-size: 14px; font-weight: bold; text-align: center; }
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <div id="lockScreen" class="lock-screen">
    <h2 class="logo" style="margin-bottom: 24px;">WELL DONE <span class="gold-text">PRO</span></h2>
    <div class="card" style="width: 100%; max-width: 320px;">
      <div class="input-group">
        <label>קוד גישה למערכת</label>
        <input type="password" id="loginPass" placeholder="הזן קוד (4241)" style="text-align: center; font-size: 20px; letter-spacing: 4px;">
      </div>
      <button class="btn btn-primary" onclick="loginApp()" style="width: 100%; justify-content: center; margin-top: 10px;">כניסה מאובטחת</button>
    </div>
  </div>

  <header class="app-header">
    <div class="header-top">
      <h1 class="logo">WELL DONE <span class="gold-text">PRO</span></h1>
      <span id="headerDate" class="date-display">─</span>
    </div>
    <button class="btn" onclick="logoutApp()" style="position: absolute; left: 16px; bottom: -12px; padding: 4px 8px; font-size: 11px; background: var(--surface3);">יציאה ↩</button>
  </header>

  <div class="card" style="padding: 10px; display: flex; flex-direction: column; gap: 10px;">
    <input type="text" id="searchBar" oninput="searchClients()" placeholder="🔍 חפש לקוח לפי שם או טלפון...">
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-primary" onclick="openAddModal()" style="flex: 1; justify-content: center;">＋ לקוח חדש</button>
      <button class="btn" id="filterAll" onclick="setFilter('all')" style="border-color: var(--gold);">הכל</button>
      <button class="btn" id="filterDebt" onclick="setFilter('debt')">בחוב</button>
    </div>
  </div>

  <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; padding: 12px;">
    <div>
      <div style="font-size: 12px; color: var(--text-muted);">סה"כ לקוחות</div>
      <div id="summaryCount" style="font-size: 20px; font-weight: 700; color: var(--gold);">0</div>
    </div>
    <div>
      <div style="font-size: 12px; color: var(--text-muted);">סה"כ חובות</div>
      <div id="summaryDebt" style="font-size: 20px; font-weight: 700; color: var(--red);">₪0</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">ניהול לקוחות</div>
    <div id="clientsList"></div>
  </div>

  <div id="addModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal-content">
      <h3 class="card-title" style="color: var(--gold);">הוספת לקוח חדש</h3>
      <div class="input-group">
        <label>שם מלא</label>
        <input type="text" id="newClientName" placeholder="ישראל ישראלי">
      </div>
      <div class="input-group">
        <label>מספר טלפון</label>
        <input type="tel" id="newClientPhone" placeholder="050-0000000">
      </div>
      <div class="input-group">
        <label>חוב / יתרה ראשונית (₪)</label>
        <input type="number" id="newClientBalance" value="0">
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
        <button class="btn" onclick="closeAddModal()">ביטול</button>
        <button class="btn btn-primary" onclick="saveNewClient()">שמור לקוח</button>
      </div>
    </div>
  </div>

  <div id="actionModal" class="modal-overlay" onclick="closeActionModalOnOverlay(event)">
    <div class="modal-content">
      <h3 class="card-title" id="actionModalTitle" style="color: var(--gold);">שם לקוח</h3>
      <p id="actionModalCurrent" style="font-size: 14px; margin-bottom: 16px; color: var(--text-muted);"></p>
      
      <div class="input-group">
        <label>סכום לשינוי (₪)</label>
        <input type="number" id="actionAmount" placeholder="הזן סכום...">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px;">
        <button class="btn btn-danger" onclick="modifyBalance('add')">＋ הוסף לחוב</button>
        <button class="btn btn-success" onclick="modifyBalance('sub')">− קבל תשלום</button>
      </div>

      <div style="margin-top: 24px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between;">
        <button class="btn btn-danger" style="background: none; border: none; font-size: 13px;" onclick="deleteClientClick()">🗑 מחק לקוח</button>
        <button class="btn" onclick="closeActionModal()">סגור</button>
      </div>
    </div>
  </div>

  <div id="toast">הודעה</div>

  <script>
  let clients = [];
  let currentFilter = 'all';
  let searchQuery = '';
  let selectedClientId = null;

  function checkAuth() {
    if (localStorage.getItem('wd_v2_auth') === 'passed') {
      document.getElementById('lockScreen').classList.add('hidden');
    }
  }
  function loginApp() {
    const p = document.getElementById('loginPass').value;
    if (p === '4241') {
      localStorage.setItem('wd_v2_auth', 'passed');
      document.getElementById('lockScreen').classList.add('hidden');
      showToast('ברוך הבא למערכת ✓');
    } else {
      showToast('קוד גישה שגוי!');
    }
  }
  function logoutApp() {
    localStorage.removeItem('wd_v2_auth');
    document.getElementById('loginPass').value = '';
    document.getElementById('lockScreen').classList.remove('hidden');
  }

  function loadData() {
    const saved = localStorage.getItem('wd_v2_clients');
    if (saved) {
      try { clients = JSON.parse(saved); } catch(e) { clients = []; }
    }
    render();
  }
  function saveData() {
    localStorage.setItem('wd_v2_clients', JSON.stringify(clients));
    render();
  }

  function setFilter(type) {
    currentFilter = type;
    document.getElementById('filterAll').style.borderColor = type === 'all' ? 'var(--gold)' : 'var(--border)';
    document.getElementById('filterDebt').style.borderColor = type === 'debt' ? 'var(--gold)' : 'var(--border)';
    render();
  }
  function searchClients() {
    searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
    render();
  }

  function render() {
    const list = document.getElementById('clientsList');
    const filtered = clients.filter(c => {
      const matchFilter = currentFilter === 'all' || (currentFilter === 'debt' && c.balance > 0);
      const matchSearch = c.name.toLowerCase().includes(searchQuery) || (c.phone && c.phone.includes(searchQuery));
      return matchFilter && matchSearch;
    });

    let totalDebt = 0;
    clients.forEach(c => { if (c.balance > 0) totalDebt += Number(c.balance); });
    document.getElementById('summaryCount').textContent = clients.length;
    document.getElementById('summaryDebt').textContent = '₪' + totalDebt.toLocaleString();

    if (filtered.length === 0) {
      list.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 24px;">אין לקוחות להצגה</p>`;
      return;
    }

    filtered.sort((a, b) => b.balance - a.balance);

    list.innerHTML = '';
    filtered.forEach(c => {
      const row = document.createElement('div');
      row.className = 'client-row';
      row.onclick = () => openActionModal(c.id);

      const badgeClass = c.balance > 0 ? 'badge-red' : 'badge-green';
      const badgeText = c.balance > 0 ? `₪${Number(c.balance).toLocaleString()}` : 'מאוזן';

      row.innerHTML = `
        <div class="client-info">
          <h4>${c.name}</h4>
          <p>📱 ${c.phone || '—'}</p>
        </div>
        <div>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
      `;
      list.appendChild(row);
    });
  }

  function openAddModal() { document.getElementById('addModal').classList.add('active'); }
  function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
    document.getElementById('newClientName').value = '';
    document.getElementById('newClientPhone').value = '';
    document.getElementById('newClientBalance').value = '0';
  }
  function closeModalOnOverlay(e) {
    if (e.target.id === 'addModal') closeAddModal();
  }

  function saveNewClient() {
    const name = document.getElementById('newClientName').value.trim();
    const phone = document.getElementById('newClientPhone').value.trim();
    const balance = parseFloat(document.getElementById('newClientBalance').value) || 0;

    if (!name) { showToast('חובה להזין שם לקוח!'); return; }

    clients.push({ id: Date.now(), name, phone, balance });
    saveData();
    closeAddModal();
    showToast('לקוח חדש התווסף בהצלחה!');
  }

  function openActionModal(id) {
    selectedClientId = id;
    const c = clients.find(item => item.id === id);
    if (!c) return;
    
    document.getElementById('actionModalTitle').textContent = c.name;
    document.getElementById('actionModalCurrent').textContent = `מצב נוכחי: ` + (c.balance > 0 ? `חוב של ₪${c.balance.toLocaleString()}` : 'מאוזן (0)');
    document.getElementById('actionAmount').value = '';
    document.getElementById('actionModal').classList.add('active');
  }

  function closeActionModal() {
    document.getElementById('actionModal').classList.remove('active');
    selectedClientId = null;
  }
  function closeActionModalOnOverlay(e) {
    if (e.target.id === 'actionModal') closeActionModal();
  }

  function modifyBalance(type) {
    const amt = parseFloat(document.getElementById('actionAmount').value);
    if (!amt || amt <= 0) { showToast('יש להזין סכום תקין'); return; }

    const c = clients.find(item => item.id === selectedClientId);
    if (!c) return;

    if (type === 'add') {
      c.balance += amt;
      showToast(`החוב עודכן`);
    } else {
      c.balance = Math.max(0, c.balance - amt);
      showToast(`נקלט תשלום`);
    }

    saveData();
    closeActionModal();
  }

  function deleteClientClick() {
    const c = clients.find(item => item.id === selectedClientId);
    if (!c) return;
    
    if (confirm(`למחוק את ${c.name}?`)) {
      clients = clients.filter(item => item.id !== selectedClientId);
      saveData();
      closeActionModal();
      showToast('הלקוח נמחק');
    }
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    document.getElementById('headerDate').textContent = now.toLocaleDateString('he-IL', {
      weekday: 'long', day: 'numeric', month: 'long'
    });
    checkAuth();
    loadData();
  });
  </script>
</body>
</html>
